name: Bug report
description: Something in the client isn't working as expected.
title: "[Bug] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Before you submit**, two things to confirm:

        1. **If this is a security issue** — please use the private
           channel via the Security tab → "Report a vulnerability"
           instead of opening a public issue. See `SECURITY.md`.

        2. **Please redact CP-identifying information** before
           submitting: real `app_code` values, IP addresses, token-shaped
           strings (`acert_live_*` / `dl_*`), and any bundle passwords.
           The runtime `redact()` helper does this automatically for
           reported logs; please apply similar discipline here.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, focused description of the symptom you observed.
      placeholder: |
        e.g. "The launcher's daily cron tick fails silently with no entry
        in /var/log/auto-certs/<app>.log. The previous cert keeps serving."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: One or two lines is fine.
      placeholder: |
        e.g. "The new cert at /etc/auto-certs/<base_domain>/fullchain.pem
        to be picked up by my reload hook (it wasn't)."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest set of commands or config that reproduces the
        issue. If you can capture a log tail from
        `/var/log/auto-certs/<app>.log`, paste it here (after
        redaction).
      render: shell
    validations:
      required: false

  - type: input
    id: client-version
    attributes:
      label: Client version
      description: |
        Output of `cat /opt/auto-certs/current/VERSION` (or, if that
        path doesn't exist, the version from your install command).
      placeholder: "0.4.0-rc14"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      description: Output of `cat /etc/os-release | head -2` if available.
      placeholder: "CentOS Linux 7.9.2009 / Ubuntu 22.04 / ..."
    validations:
      required: true

  - type: input
    id: openssl
    attributes:
      label: openssl version
      description: Output of `openssl version`.
      placeholder: "OpenSSL 1.0.2k-fips 26 Jan 2017"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How was the client installed?
      options:
        - "curl -sSL .../install.sh | sudo sh -s -- --app <app_code>"
        - "Downloaded install.sh + scp'd to host (CentOS 6 bootstrap path)"
        - "Manually unpacked the release tarball"
        - "Other (describe in 'What happened?' above)"
    validations:
      required: true

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: Logs you've already inspected, things you've tried, hypotheses.
    validations:
      required: false
