# Release pipeline — runs on every push of a v* tag.
#
# Outputs (attached to the GitHub Release):
#   1. auto-certs-client-${VERSION}.tar.gz                  — release tarball
#   2. auto-certs-client-${VERSION}.tar.gz.sigstore.json    — cosign keyless bundle (signature + cert + Rekor proof)
#   3. auto-certs-client-${VERSION}.tar.gz.release.sig      — RSA-4096 detached signature (Phase 6 client-trust path)
#   4. auto-certs-client-${VERSION}.spdx.json               — SPDX 2.3 SBOM (via syft)
#   5. install.sh                                           — bootstrap installer (the curl|sh entry point)
#   6. SHA256SUMS                                           — checksums for every artifact
#   7. (out-of-band) build-provenance attestation           — SLSA v1, queryable via gh attestation verify
#
# Pre-rc10 the cosign output was a `.sig` + `.crt` two-file pair (cosign
# 2.x flow). Migrated to the single `.sigstore.json` bundle (cosign 3.x)
# at v0.3.0-rc10 — pre-CP-onboarding migration so the bundle format is
# the public baseline. See CHANGELOG §50 for rationale.
#
# All third-party actions pinned to commit SHA. Dependabot refreshes them via PR.
#
# Cosign signing is keyless via GitHub OIDC — no maintained signing
# key, no rotation. The Phase 2 release-signing key (RSA-4096 in AWS
# Secrets Manager) is for bundle-content signing inside the encrypted
# envelope — different purpose, stays internal.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write          # for creating the GH Release + uploading artifacts
  id-token: write          # for cosign keyless OIDC
  attestations: write      # for actions/attest-build-provenance

jobs:
  build-and-release:
    name: Build + sign + release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # GITHUB_REF_NAME is the tag name when triggered by tag push.
          version="${GITHUB_REF_NAME}"
          if [ -z "$version" ]; then
            echo "::error::GITHUB_REF_NAME is empty — not a tag push?"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $version"

      - name: Verify tag matches payload/VERSION
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${{ steps.version.outputs.version }}"
          # Strip leading `v` from tag for comparison with semver-only VERSION.
          stripped="${tag_version#v}"
          payload_version=$(tr -d '\n' < payload/VERSION)
          if [ "$stripped" != "$payload_version" ]; then
            echo "::error::Tag ${tag_version} (stripped: ${stripped}) does not match payload/VERSION (${payload_version})"
            exit 1
          fi
          echo "Tag and payload/VERSION agree: ${stripped}"

      - name: Build tarball
        id: build
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          tarball="auto-certs-client-${version}.tar.gz"
          # Use a deterministic transform so the tarball's top-level
          # directory is predictable: auto-certs-client-${version}/...
          tar -czf "$tarball" \
              --transform "s,^,auto-certs-client-${version}/," \
              --owner=0 --group=0 \
              --sort=name \
              --mtime="@$(git log -1 --pretty=%ct)" \
              --exclude='./.git*' \
              --exclude='./.github' \
              --exclude='./test' \
              --exclude='./*.tar.gz*' \
              --exclude='./*.spdx.json' \
              --exclude='./SHA256SUMS' \
              ./README.md ./LICENSE ./SECURITY.md ./.gitattributes \
              ./launcher.sh ./updater.sh ./install.sh ./reload.sh.placeholder \
              ./payload ./conf.d
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "Built: $tarball ($(stat -c%s "$tarball") bytes)"
          tar -tzf "$tarball" | head -20

      - name: Install cosign
        # Bumped to v4.1.1 (cosign 3.x — Sigstore bundle format default)
        # at v0.3.0-rc10 cut, before first-CP onboarding so the bundle
        # format is the public baseline. cosign 3.x consolidates
        # signature + certificate + transparency-log proof into a single
        # `.sigstore.json` bundle file (Sigstore standard). The 2.x
        # `--output-signature` + `--output-certificate` two-file flow
        # was removed; `--bundle` is now required on `sign-blob`.
        # `COSIGN_EXPERIMENTAL` is no longer needed (keyless is on by
        # default in v3). Migration rationale + 7-step checklist:
        # CHANGELOG §50 (rejecting initial deferral from §49 — pre-CP
        # is the right time to migrate, since there are zero downstream
        # consumers with frozen recipes).
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign tarball with cosign (keyless OIDC)
        shell: bash
        run: |
          set -euo pipefail
          tarball="${{ steps.build.outputs.tarball }}"
          cosign sign-blob --yes \
            --bundle "${tarball}.sigstore.json" \
            "$tarball"
          echo "Signed: ${tarball}.sigstore.json ($(stat -c%s "${tarball}.sigstore.json") bytes)"

      - name: Generate SBOM (SPDX 2.3 JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: '.'
          format: 'spdx-json'
          output-file: 'auto-certs-client-${{ steps.version.outputs.version }}.spdx.json'
          upload-artifact: false
          upload-release-assets: false

      - name: RSA-4096 sign tarball (Phase 6 client-trust path)
        # Phase 6 Step 3 prereq — every CP host's `updater.sh` verifies
        # release tarballs against the pinned `payload/lib/server-pubkey.pem`
        # using `crypto.sh::verify_signature`. Same primitive
        # `App\Cert\DeliveryEnvelope::seal` uses for cert-bundle signing.
        #
        # Gated on the `RELEASE_SIGNING_KEY` repo secret being set, so
        # this workflow stays green when the secret hasn't been
        # provisioned yet (deferred-prereq pattern). When the operator
        # adds the secret, the next tag push picks it up automatically.
        #
        # The secret value is the PEM-encoded private key from the
        # AWS Secrets Manager entry `auto-certs/release-signing-key`
        # (the same key DeliveryEnvelope::seal uses). Filename is
        # `<tarball>.release.sig` — distinct from `.sig` which is
        # cosign's keyless signature.
        if: ${{ env.RELEASE_SIGNING_KEY != '' }}
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          tarball="${{ steps.build.outputs.tarball }}"
          # Mode-600 temp file — same discipline as DeliveryEnvelope::seal.
          keyfile=$(mktemp)
          chmod 600 "$keyfile"
          # `printf '%s'` (not `echo`) preserves PEM-base64 lines
          # verbatim — `echo` could mangle backslashes if any survive
          # in the secret value.
          printf '%s' "$RELEASE_SIGNING_KEY" > "$keyfile"
          openssl dgst -sha256 -sign "$keyfile" \
            -out "${tarball}.release.sig" "$tarball"
          # Self-verify before declaring success — a mismatched key would
          # produce an unverifiable sig and waste an artifact slot.
          openssl rsa -in "$keyfile" -pubout -out /tmp/release-pubkey.pem 2>/dev/null
          openssl dgst -sha256 -verify /tmp/release-pubkey.pem \
            -signature "${tarball}.release.sig" "$tarball"
          # Wipe key from disk before continuing.
          shred -u "$keyfile" /tmp/release-pubkey.pem 2>/dev/null \
            || rm -f "$keyfile" /tmp/release-pubkey.pem
          echo "Signed: ${tarball}.release.sig ($(stat -c%s "${tarball}.release.sig") bytes)"

      - name: Compute checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          # install.sh is a top-level repo file that the release workflow
          # also uploads as a release asset (so the documented one-liner
          # `curl ... /releases/download/<tag>/install.sh | sudo sh -s -- --app <code>`
          # actually resolves). Including it in SHA256SUMS lets operators
          # verify the bootstrap script independently of the tarball it
          # then auto-fetches.
          # `.sigstore.json` is the cosign 3.x bundle (replaces the
          # legacy `.sig` + `.crt` two-file pair as of v0.3.0-rc10).
          files=(
            "auto-certs-client-${version}.tar.gz"
            "auto-certs-client-${version}.tar.gz.sigstore.json"
            "auto-certs-client-${version}.spdx.json"
            "install.sh"
          )
          # Conditional: RSA detached sig if the prior step ran (secret set).
          if [ -f "auto-certs-client-${version}.tar.gz.release.sig" ]; then
            files+=("auto-certs-client-${version}.tar.gz.release.sig")
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          cat SHA256SUMS

      - name: Generate SLSA build-provenance attestation
        # GitHub-managed attestations are free for public repos but
        # gated by org billing on private repos. While this repo is
        # PRIVATE during pre-GA, skip the step. It auto-enables when
        # the repo flips to public at first-CP go-live.
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            auto-certs-client-${{ steps.version.outputs.version }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## Verifying this release

            See [README.md "How to verify the release signature"](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.version }}/README.md#how-to-verify-the-release-signature) for the full verification commands.

            Quick reference:

            ```sh
            VERSION=${{ steps.version.outputs.version }}
            cosign verify-blob \
              --bundle auto-certs-client-${VERSION}.tar.gz.sigstore.json \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
              --certificate-oidc-issuer     "https://token.actions.githubusercontent.com" \
              auto-certs-client-${VERSION}.tar.gz
            ```

            *(cosign 3.x bundle format — this release line uses `.sigstore.json` as of v0.3.0-rc10. Earlier rc1–rc9 used the legacy `--sig` + `--crt` two-file format with `cosign verify-blob --certificate <crt> --signature <sig>`.)*

            ## Artifacts

            - `auto-certs-client-${{ steps.version.outputs.version }}.tar.gz` — release tarball
            - `auto-certs-client-${{ steps.version.outputs.version }}.tar.gz.sigstore.json` — cosign keyless bundle (signature + certificate + transparency-log proof; replaces the legacy `.sig` + `.crt` pair)
            - `auto-certs-client-${{ steps.version.outputs.version }}.tar.gz.release.sig` — RSA-4096 detached signature (Phase 6 client-trust path; only present when `RELEASE_SIGNING_KEY` repo secret is set)
            - `auto-certs-client-${{ steps.version.outputs.version }}.spdx.json` — SBOM (SPDX 2.3)
            - `install.sh` — bootstrap installer (the curl|sh entry point; auto-fetches the tarball, SHA-256-verifies, and runs)
            - `SHA256SUMS` — checksums for every artifact (including `install.sh`)
            - SLSA build-provenance attestation — see the **Attestations** section
          files: |
            auto-certs-client-${{ steps.version.outputs.version }}.tar.gz
            auto-certs-client-${{ steps.version.outputs.version }}.tar.gz.sigstore.json
            auto-certs-client-${{ steps.version.outputs.version }}.tar.gz.release.sig
            auto-certs-client-${{ steps.version.outputs.version }}.spdx.json
            install.sh
            SHA256SUMS
