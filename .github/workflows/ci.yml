# CI — runs on every PR and on push to main.
#
# - shellcheck-all: POSIX-sh static analysis. The client targets POSIX
#   sh per Phase 4 §0 (CentOS 6 floor). Strict shellcheck is the load-
#   bearing readability gate the CP MIS audit relies on.
# - syntax-check: runs `sh -n` against each script. Catches parse errors
#   that shellcheck might miss in pathological cases (rare; cheap).
#
# All third-party actions pinned to commit SHA per CLAUDE.md
# "Operational essentials" (GhostAction lesson). Dependabot refreshes
# them via PR (.github/dependabot.yml).

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck-all:
    name: shellcheck (POSIX sh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        env:
          # SC1090: "Can't follow non-constant source." We use `. "$LIB_DIR/foo.sh"`
          #   pattern because $LIB_DIR is determined at runtime from the launcher's
          #   payload-dir resolution. Suppress.
          # SC2034: "variable appears unused." False-positive when shellcheck doesn't
          #   follow the source chain — RC_OK, RC_GENERIC, JKS_PASSWORD, etc. are
          #   used in other lib files that get sourced into the same env.
          SHELLCHECK_OPTS: -s sh -S warning -e SC1090,SC2034
        with:
          # Fail on warnings AND errors. Style/info notes are advisory.
          severity: warning
          # Don't recurse into vendored test fixtures (none today; future-proof).
          ignore_paths: test/_tmp test/fixtures
          ignore_names: '.gitattributes'

  syntax-check:
    name: sh -n (parse-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Parse each script
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            # Use /bin/sh (dash on Ubuntu) to match the CentOS-6 sh
            # parsing behavior more closely than bash.
            if ! /bin/sh -n "$f" 2>&1; then
              echo "::error file=$f::failed sh -n"
              fail=1
            fi
          done < <(find . -type f \( -name '*.sh' -o -name '*.placeholder' \) -not -path './.git/*')
          exit "$fail"

  loc-budget:
    name: payload LOC budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Count
        shell: bash
        run: |
          set -euo pipefail
          # Phase 4 §0 originally specified a hard cap (≤500 lines for
          # combined payload/auto_certs.sh + payload/lib/*.sh). The
          # implementation landed slightly higher and was operator-
          # blessed; we now enforce a regression-detection cap that
          # leaves headroom for ongoing maintenance but rejects
          # unbounded growth.
          launcher_loc=$(wc -l < launcher.sh)
          payload_loc=$(cat payload/auto_certs.sh payload/lib/*.sh | wc -l)
          install_loc=$(wc -l < install.sh)
          echo "launcher.sh                         : $launcher_loc lines (cap: 80)"
          echo "payload/auto_certs.sh + lib/*.sh    : $payload_loc lines (cap: 2150)"
          echo "install.sh                          : $install_loc lines (cap: 660)"
          fail=0
          [ "$launcher_loc" -le 80 ] || { echo "::error::launcher.sh exceeds cap"; fail=1; }
          # Cap bumped 1500→1600 in v0.3.0-rc7 to accommodate NEW-39 fix
          # (~28 lines for AUTO_CERTS_CACERT wiring in http.sh + auto_certs.sh).
          # Cap bumped 1600→1700 in v0.3.0-rc14 to accommodate the
          # server-authoritative base_domain plumbing (~10 lines for
          # response-parse + override-with-warn + final-guard + comments).
          # Cap bumped 1700→1900 in v0.4.0-rc1 (Phase JKS B per
          # PLAN.jks.md §6) for the multi-step JKS branch: ~174 LOC
          # across compute_local_jks_hash, fetch_and_stage_jks,
          # process_jks_only_update, response parse, and same-fs
          # staging discipline.
          # Cap bumped 1900→1960 in v0.4.0-rc2 (auto-certs server
          # CHANGELOG §100) for the ensure_hook_executable helper
          # (~30 LOC in lib/common.sh + ~13 LOC × 2 call sites for
          # invocation + exit-126 hint blocks in auto_certs.sh). Net
          # ~56 LOC; 1938 measured; 1960 leaves modest headroom.
          # Cap bumped 1960→2050 in v0.4.0-rc3 (auto-certs server
          # CHANGELOG §102) for classify_host_state_only (~30 LOC in
          # lib/common.sh) + run_self_check rc=2 branch (~15 LOC) +
          # main-loop aggregation rewrite (~10 LOC). Net ~50 LOC;
          # 2009 measured; 2050 leaves headroom.
          # Cap bumped 2050→2120 in v0.4.0-rc8 (auto-certs server
          # CHANGELOG §108) for the install-intent header path:
          # reading /etc/auto-certs/.install_intent, appending
          # X-Auto-Certs-Install-Intent header on /check, and
          # unlinking the file after a 2xx response. Net ~31 LOC;
          # 2086 measured; 2120 leaves headroom.
          # Cap bumped 2120→2150 in v0.4.0-rc10 (auto-certs server
          # CHANGELOG §113) for the reload-hook env-var-propagation
          # fix at BOTH hook call sites: `VAR=val func` syntax
          # replaced with explicit `export ... ; func ; unset ...`
          # to POSIX-correctly propagate env vars to grandchildren,
          # and `${_hook_jks_env}` expansion-in-env-prefix-position
          # removed (it made the shell try to exec a command literally
          # named `AUTO_CERTS_BUNDLE_HAS_JKS=1` → exit 127 on JKS-on
          # apps). ~15 LOC code per site + ~30 LOC comment per site
          # = ~90 LOC total. 2133 measured; 2150 leaves headroom.
          # Drove the 2026-05-15 jljj exit-127 reload-hook investigation.
          # install.sh cap bumped 400→500 in v0.3.0-rc9 to accommodate the
          # auto-fetch implementation (CHANGELOG §47): when --source-dir
          # is not given, install.sh discovers the latest release via the
          # GitHub API, fetches SHA256SUMS + tarball, SHA-256-verifies,
          # extracts, and proceeds. Replaces the "Phase 7 will add GitHub
          # fetch" stub. ~80 lines for the full bootstrap path.
          # install.sh cap bumped 500→600 in v0.3.0-rc12 to accommodate
          # the email-installer fast-path (§68): --api-token / --bundle-
          # password arms, paired-flag validation, two-stage conf write
          # (PATCH STAGE that filters + appends secret lines), and the
          # expanded header-comment doctrine block. Total ~70 lines.
          # install.sh cap bumped 600→660 in v0.4.0-rc5 (auto-certs server
          # CHANGELOG §104) for _ac_try_bootstrap_cacert helper +
          # _ac_fetch retry-on-cert-error + end-of-install cacert seed
          # (~70 LOC). 620 measured; 660 leaves headroom.
          # Headroom is intentional — security fixes + functional features
          # shouldn't be gated by a cosmetic LOC cap. Bump again if future
          # fixes legitimately push past.
          [ "$payload_loc"  -le 2150 ] || { echo "::error::payload total exceeds cap"; fail=1; }
          [ "$install_loc"  -le 660 ] || { echo "::error::install.sh exceeds cap"; fail=1; }
          exit "$fail"
