# auto-certs per-app config
#
# One file per app on this host. Filename should be `<app_code>.conf`.
# The launcher iterates over every `*.conf` in /etc/auto-certs/conf.d/
# and processes each app independently — failure for one does not
# block another.
#
# Format: KEY=VALUE, no spaces around `=`, value-with-spaces in double
# quotes. Values are sourced as shell variables, so no metacharacters
# unless you know what you're doing.

# Required:
APP_CODE=example_app                     # matches what admin onboarded
BASE_DOMAIN=example_app.wakool.net       # the wildcard scope
API_TOKEN=acert_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx   # generated in admin UI
BUNDLE_PASSWORD=yyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyy        # generated in admin UI
SERVER_URL=https://auto-certs.xforce-games.com

# Optional (sensible defaults):
CERT_DIR=/etc/auto-certs/example_app.wakool.net   # where the bundle lands
HOOK_PATH=/opt/auto-certs/reload.sh                # what to run after install
HOOK_TIMEOUT_SECONDS=60                            # cap on reload hook runtime

# JKS password — only used for apps where bundle includes a keystore.jks.
# Per CLAUDE.md, JKS password is dictated by the app developer (it ends up
# embedded in their server code, e.g. Tomcat config). v1 ships JKS via the
# S3 ancient-way fallback for JKS-needing apps; the client doesn't need
# this for the v1 PEM-only download.
# JKS_PASSWORD=

# Optional: local TLS self-test targets after reload hook. Format:
# space-separated "host:port" list. The client connects to each via
# openssl s_client, fingerprints the served cert, and confirms it matches
# what we just installed. Mismatch indicates partial-reload — strong
# signal for fleet alerting.
LOCAL_TLS_TARGETS="127.0.0.1:443 127.0.0.1:8443"

# Optional: where local logs go. Default /var/log/auto-certs/<app>.log
# LOG_DIR=/var/log/auto-certs
